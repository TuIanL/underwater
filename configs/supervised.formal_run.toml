[experiment]
name = "breaststroke-yolo-supervised-formal-run"
output_dir = "artifacts/checkpoints/supervised_yolo_formal_run"
seed = 7
conservative_stage = "stage0_yolo_2d_baseline"

[dataset]
train_index = "data/manifests/splits/train.csv"
val_index = "data/manifests/splits/val.csv"
annotation_index = "data/manifests/annotation_index.csv"
image_root = "data/frames"
input_width = 640
input_height = 640
heatmap_width = 64
heatmap_height = 64

[model]
family = "yolo_pose"

[training]
epochs = 20
batch_size = 8
learning_rate = 0.001
weight_decay = 0.0005
num_workers = 0

[yolo]
pretrained_model = "yolov8s-pose.pt"
image_size = 640
predict_batch_size = 8
box_confidence = 0.25
visibility_visible_threshold = 0.55
visibility_inferable_threshold = 0.2
adaptation_preset = "underwater_v1"

[postprocess]
enabled = true
method = "ema"
alpha = 0.65
min_alpha = 0.2
confidence_floor = 0.1
