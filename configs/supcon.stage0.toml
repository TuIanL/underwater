[experiment]
name = "swim-supcon-phase0"
output_dir = "artifacts/checkpoints/supcon_stage0"
seed = 7
conservative_stage = "stage0_baseline"

[dataset]
video_index = "data/manifests/supcon_videos.csv"
input_width = 112
input_height = 112
clip_length = 8
frame_stride = 2
temporal_jitter = 1
crop_scale_min = 0.7
crop_scale_max = 1.0
color_jitter_strength = 0.4
grayscale_prob = 0.2
blur_prob = 0.5
blur_kernel_size = 5
tube_mask_prob = 0.0
tube_mask_frames_min = 2
tube_mask_frames_max = 3
tube_mask_scale_min = 0.25
tube_mask_scale_max = 0.4
tube_mask_fill_mode = "zero"
tube_mask_center_bias = 0.6

[model]
backbone = "r2plus1d_18"
pretrained_backbone = true
pretrained_checkpoint = ""
projection_hidden_dim = 512
projection_dim = 128

[training]
epochs = 40
batch_size = 16
gradient_accumulation_steps = 2
learning_rate = 0.01
weight_decay = 0.0001
momentum = 0.9
optimizer = "sgd"
temperature = 0.07
warmup_epochs = 4
amp = true
clip_grad_norm = 1.0
num_workers = 4
use_cosine_schedule = true
