[experiment]
name = "breaststroke-semi-supervised-temporal"
output_dir = "artifacts/checkpoints/semi_supervised_temporal"
seed = 7

[dataset]
labeled_index = "data/manifests/annotation_index.csv"
unlabeled_index = "data/manifests/unlabeled_index.csv"
image_root = "data/frames"
input_width = 256
input_height = 256
heatmap_width = 64
heatmap_height = 64

[model]
backbone = "resnet18"
pretrained_backbone = true
pretrained_checkpoint = "artifacts/checkpoints/supervised/best.pt"

[training]
epochs = 10
batch_size = 8
learning_rate = 0.0005
weight_decay = 0.0001
num_workers = 0
visibility_loss_weight = 0.2
consistency_loss_weight = 0.5
pseudolabel_threshold = 0.5
temporal_loss_weight = 0.1
temporal_threshold = 0.5
