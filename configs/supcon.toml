[experiment]
name = "swim-supcon-phase1"
output_dir = "artifacts/checkpoints/supcon"
seed = 7

[dataset]
video_index = "data/manifests/supcon_videos.csv"
input_width = 224
input_height = 224
clip_length = 8
frame_stride = 2
temporal_jitter = 1
crop_scale_min = 0.7
crop_scale_max = 1.0
color_jitter_strength = 0.4
grayscale_prob = 0.2
blur_prob = 0.5
blur_kernel_size = 5

[model]
backbone = "resnet18"
pretrained_backbone = true
pretrained_checkpoint = ""
projection_hidden_dim = 512
projection_dim = 128

[training]
epochs = 10
batch_size = 4
learning_rate = 0.01
weight_decay = 0.0001
momentum = 0.9
optimizer = "sgd"
temperature = 0.07
num_workers = 0
device = "cpu"
use_cosine_schedule = true
